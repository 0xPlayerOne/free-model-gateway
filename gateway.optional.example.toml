[server]
bind = "127.0.0.1:8008"
local_base_url = "http://127.0.0.1:8000/v1"
exposure = "loopback"

# Anthropic is intentionally omitted until the native Messages adapter exists.

[providers.deepseek]
profile = "deepseek"
adapter = "openai_chat"
base_url = "https://api.deepseek.com/v1"
api_key_secret = "DEEPSEEK_API_KEY"
billing_mode = "paid"

[providers.fireworks]
profile = "fireworks"
adapter = "openai_chat"
base_url = "https://api.fireworks.ai/inference/v1"
api_key_secret = "FIREWORKS_API_KEY"
billing_mode = "paid"

[providers.openai-api]
profile = "openai_api"
adapter = "openai_chat"
base_url = "https://api.openai.com/v1"
api_key_secret = "OPENAI_API_KEY"
billing_mode = "paid"

[providers.opencode-go]
profile = "open_code_go"
adapter = "openai_chat"
base_url = "https://opencode.ai/zen/go/v1"
api_key_secret = "OPENCODE_API_KEY"
billing_mode = "subscription"

[providers.orcarouter]
profile = "orca_router"
adapter = "openai_chat"
base_url = "https://api.orcarouter.ai/v1"
api_key_secret = "ORCAROUTER_API_KEY"
billing_mode = "paid"

[providers.zai]
profile = "zai"
adapter = "openai_chat"
base_url = "https://api.z.ai/api/paas/v4"
api_key_secret = "ZAI_API_KEY"
billing_mode = "paid"

[models.deepseek]
targets = [{ provider = "deepseek", model = "deepseek-chat" }]

[models.fireworks]
targets = [{ provider = "fireworks", model = "accounts/fireworks/models/llama-v3p1-8b-instruct" }]

[models.openai-api]
targets = [{ provider = "openai-api", model = "gpt-4o-mini" }]

[models.opencode-go]
targets = [{ provider = "opencode-go", model = "kimi-k3" }]

[models.orcarouter]
targets = [{ provider = "orcarouter", model = "auto" }]

[models.zai]
targets = [{ provider = "zai", model = "glm-4.5" }]
